databaseChangeLog:
- changeSet:
      id: 8
      author: timode-6
      changes:
        - createIndex:
            collectionName: payments
            keys: '{ "user_id": 1, "timestamp": -1 }'
            options: '{ "name": "idx_payments_user_timestamp" }'
