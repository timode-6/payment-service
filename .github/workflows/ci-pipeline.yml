name: CI Pipeline

on:
  push:
    branches: [ main, tasks ]
  pull_request:
    branches: [ main, tasks ]

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'temurin'
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/payment-service

jobs:
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: 🔨 Build (skip tests)
        run: |
          chmod +x gradlew
          ./gradlew build -x test --no-daemon

      - name: 📤 Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/*.jar

  code-analysis:
    name: 🔍 SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: ☕ Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'gradle'

      - name: 🔍 Run SonarQube
        run: |
         ./gradlew classes sonar -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} -Dsonar.projectName=${{ secrets.SONAR_PROJECT_NAME }} -Dsonar.scanner.skipJreProvisioning=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

  docker:
    name: 🐳 Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [build, code-analysis] 
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/tasks')
    steps:
      - uses: actions/checkout@v4
      
      - name: 📥 Download JAR
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: build/libs/

      - name: 🔐 Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:latest
