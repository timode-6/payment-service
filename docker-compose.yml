services:

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    hostname: kafka
    networks:
      - payment-net
    ports:
      - "9092:9092"       
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: >-
        INTERNAL://0.0.0.0:29092,
        EXTERNAL://0.0.0.0:9092,
        CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: >-
        INTERNAL://kafka:29092,
        EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        INTERNAL:PLAINTEXT,
        EXTERNAL:PLAINTEXT,
        CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3

      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      KAFKA_LOG4J_LOGGERS: >-
        kafka.controller=WARN,
        kafka.log.LogCleaner=WARN,
        state.change.logger=WARN,
        org.apache.kafka=WARN
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: mongo
    hostname: mongo
    networks:
      - payment-net
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb
      MONGO_INITDB_DATABASE: payment_db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" | grep 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  random-number-service:
    build:
      context: ../payment-service/random-number-service
      dockerfile: Dockerfile
    image: random-number-service:latest
    container_name: random-number-service
    hostname: random-number-service
    networks:
      - payment-net
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/health | grep UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  payment-service:
    build:
      context: ../payment-service
      dockerfile: Dockerfile
    image: payment-service:latest
    container_name: payment-service
    hostname: payment-service
    networks:
      - payment-net
    ports:
      - "8084:8084"
    depends_on:
      mongo:
        condition: service_healthy
      kafka:
        condition: service_healthy
      random-number-service:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      
      MONGODB_URI: mongodb://mongodb:mongodb@mongo:27017/payment_db?authSource=admin
      MONGODB_DATABASE: payment_db

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      RANDOM_SERVICE_URL: http://random-number-service:8085

      JWT_SECRET: ${JWT_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8084"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  payment-net:
    driver: bridge

volumes:
  kafka-data:
    driver: local
  mongo-data:
    driver: local
